{% extends "admin_base.html" %}
{% block content %}
<style>
.home-hero {
    min-height: calc(100vh - 120px);
    margin: 16px;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
        radial-gradient(circle at 20% 20%, rgba(189, 187, 191, 0.35), transparent 42%),
        radial-gradient(circle at 80% 25%, rgba(162, 161, 164, 0.28), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(95, 95, 95, 0.16), transparent 46%),
        linear-gradient(135deg, #efe4e9 0%, #f7f4f7 45%, #ece7ec 100%);
    border: 1px solid rgba(95, 95, 95, 0.08);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 20px 60px rgba(95,95,95,0.12);
}

.home-hero::before,
.home-hero::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(2px);
    pointer-events: none;
}

.home-hero::before {
    width: 360px;
    height: 360px;
    top: -120px;
    right: -80px;
    background: rgba(189, 187, 191, 0.22);
}

.home-hero::after {
    width: 300px;
    height: 300px;
    left: -90px;
    bottom: -120px;
    background: rgba(162, 161, 164, 0.2);
}

.home-hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 24px;
}

.home-hero-title {
    margin: 0;
    line-height: 1.08;
    font-size: clamp(40px, 8vw, 94px);
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #5f5f5f;
    text-shadow: 0 8px 30px rgba(95,95,95,0.12);
}

.home-hero-sub {
    margin-top: 14px;
    font-size: clamp(12px, 1.8vw, 16px);
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: rgba(95,95,95,0.55);
}

@media (max-width: 768px) {
    .home-hero {
        min-height: calc(100vh - 140px);
        margin: 12px;
        border-radius: 18px;
    }
}
</style>

<div class="home-hero">
    <div class="home-hero-content">
        <h1 class="home-hero-title">HELLO<br>WELCOME TO aiAgentOS</h1>
        <div class="home-hero-sub">INTELLIGENT WATCH PLATFORM</div>
    </div>
</div>
{% end %}
