{% extends "admin_base.html" %}
{% block content %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: transparent !important;
    }

    .watch-collect-container {
        padding: 20px;
        background: linear-gradient(135deg, #efe4e9 0%, #a2a1a4 50%, #5f5f5f 100%);
        min-height: 100vh;
        color: #5f5f5f;
        position: relative;
    }

    .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
    }

    .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: rgba(95, 95, 95, 0.3);
        border-radius: 50%;
        animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
    }

    .content-wrapper {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 20px 0;
    }

    .header {
        text-align: center;
        margin-bottom: 40px;
    }

    .logo {
        font-size: 42px;
        font-weight: 800;
        background: linear-gradient(135deg, #5f5f5f 0%, #8a8a8a 50%, #bdbbbf 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
        letter-spacing: -2px;
    }

    .subtitle {
        font-size: 14px;
        color: rgba(95, 95, 95, 0.6);
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    .search-box {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(95, 95, 95, 0.15);
        border-radius: 24px;
        padding: 40px;
        margin-bottom: 40px;
        box-shadow: 0 25px 50px rgba(95, 95, 95, 0.15);
    }

    .search-input-wrapper {
        position: relative;
        margin-bottom: 30px;
    }

    .search-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.5);
        border: 2px solid rgba(95, 95, 95, 0.15);
        border-radius: 16px;
        padding: 20px 60px 20px 24px;
        font-size: 18px;
        color: #5f5f5f;
        transition: all 0.3s ease;
        outline: none;
    }

    .search-input:focus {
        border-color: rgba(95, 95, 95, 0.4);
        box-shadow: 0 0 30px rgba(95, 95, 95, 0.1);
    }

    .search-icon {
        position: absolute;
        right: 24px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 24px;
        color: rgba(95, 95, 95, 0.4);
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .search-icon:hover {
        color: #5f5f5f;
        transform: translateY(-50%) scale(1.1);
    }

    .sources-section {
        margin-bottom: 30px;
    }

    .section-title {
        font-size: 14px;
        color: rgba(95, 95, 95, 0.6);
        margin-bottom: 16px;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .sources-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
    }

    .source-item {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.35);
        border: 1px solid rgba(95, 95, 95, 0.15);
        border-radius: 12px;
        padding: 12px 20px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .source-item:hover {
        background: rgba(255, 255, 255, 0.5);
        border-color: rgba(95, 95, 95, 0.25);
    }

    .source-item.active {
        background: linear-gradient(135deg, rgba(95, 95, 95, 0.15), rgba(189, 187, 191, 0.2));
        border-color: rgba(95, 95, 95, 0.35);
    }

    .source-checkbox {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(95, 95, 95, 0.3);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
    }

    .source-item.active .source-checkbox {
        background: linear-gradient(135deg, #5f5f5f, #8a8a8a);
        border-color: transparent;
    }

    .source-checkmark {
        color: #efe4e9;
        font-size: 12px;
        font-weight: bold;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .source-item.active .source-checkmark {
        opacity: 1;
    }

    .source-name {
        font-size: 15px;
        font-weight: 500;
        color: rgba(95, 95, 95, 0.85);
    }

    .params-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .param-item {
        background: rgba(255, 255, 255, 0.35);
        border-radius: 12px;
        padding: 20px;
    }

    .param-label {
        font-size: 13px;
        color: rgba(95, 95, 95, 0.6);
        margin-bottom: 10px;
    }

    .param-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(95, 95, 95, 0.15);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 15px;
        color: #5f5f5f;
        outline: none;
        transition: all 0.3s ease;
    }

    .param-input:focus {
        border-color: rgba(95, 95, 95, 0.4);
    }

    .collect-btn {
        width: 100%;
        background: linear-gradient(135deg, #5f5f5f 0%, #8a8a8a 100%);
        border: none;
        border-radius: 16px;
        padding: 18px;
        font-size: 18px;
        font-weight: 600;
        color: #efe4e9;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 30px rgba(95, 95, 95, 0.3);
        margin-top: 10px;
    }

    .collect-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(95, 95, 95, 0.4);
    }

    .collect-btn:active {
        transform: translateY(-1px);
    }

    .collect-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .results-box {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(95, 95, 95, 0.15);
        border-radius: 24px;
        padding: 40px;
        display: none;
    }

    .results-box.show {
        display: block;
    }

    .results-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 24px;
        color: rgba(95, 95, 95, 0.85);
    }

    .result-item {
        background: rgba(255, 255, 255, 0.35);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .result-info {
        flex: 1;
    }

    .result-source {
        font-size: 13px;
        color: rgba(95, 95, 95, 0.6);
        margin-bottom: 4px;
    }

    .result-page {
        font-size: 15px;
        color: rgba(95, 95, 95, 0.85);
    }

    .result-status {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
    }

    .result-status.success {
        background: rgba(189, 187, 191, 0.3);
        color: #5f5f5f;
    }

    .result-status.error {
        background: rgba(239, 68, 68, 0.2);
        color: #C74545;
    }
</style>

<div class="watch-collect-container">
    <div class="stars" id="stars"></div>

    <div class="content-wrapper">
        <div class="header">
            <div class="logo">👁️ 瞭望采集</div>
            <div class="subtitle">AI-powered Data Collection</div>
        </div>

        <div class="search-box">
            {% module xsrf_form_html() %}
            <div class="search-input-wrapper">
                <input type="text" class="search-input" id="keywordInput" placeholder="输入你要采集的关键词...">
                <div class="search-icon" id="searchBtn">🔍</div>
            </div>

            <div class="sources-section">
                <div class="section-title">选择采集源</div>
                <div class="sources-grid">
                    {% for s in sources %}
                    <div class="source-item" data-id="{{ s['id'] }}" onclick="toggleSource(this)">
                        <div class="source-checkbox">
                            <span class="source-checkmark">✓</span>
                        </div>
                        <span class="source-name">{{ s['source_name'] }}</span>
                    </div>
                    {% end %}
                </div>
            </div>

            <div class="params-section">
                <div class="param-item">
                    <div class="param-label">每页采集数量</div>
                    <input type="number" class="param-input" id="countPerPage" value="10" min="1" max="50">
                </div>
                <div class="param-item">
                    <div class="param-label">采集页数</div>
                    <input type="number" class="param-input" id="pages" value="1" min="1" max="10">
                </div>
            </div>

            <button class="collect-btn" id="collectBtn" onclick="startCollect()">
                🚀 开始采集
            </button>
        </div>

        <div class="results-box" id="resultsBox">
            <div class="results-title">📊 采集结果</div>
            <div id="resultsList"></div>
        </div>

        <div class="results-box show" id="autoTaskBox" style="margin-top:20px;display:block;">
            <div class="results-title">⏱ 自动采集任务</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;margin-bottom:14px;">
                <input type="text" id="taskName" class="param-input" placeholder="任务名称">
                <input type="text" id="taskKeyword" class="param-input" placeholder="关键词">
                <input type="number" id="taskInterval" class="param-input" value="60" min="1" placeholder="间隔(分钟)">
                <input type="number" id="taskPages" class="param-input" value="1" min="1" max="10" placeholder="页数">
                <button class="collect-btn" style="padding:10px 14px;min-width:110px;" onclick="createAutoTask()">新增任务</button>
            </div>
            <div id="taskList"></div>
        </div>
    </div>
</div>
{% end %}

{% block js %}
<script>
function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
    }
}
createStars();

function toggleSource(element) {
    element.classList.toggle('active');
}

function getSelectedSources() {
    const sources = [];
    document.querySelectorAll('.source-item.active').forEach(item => {
        sources.push(item.dataset.id);
    });
    return sources;
}

async function startCollect() {
    const keyword = document.getElementById('keywordInput').value.trim();
    const sourceIds = getSelectedSources();
    const countPerPage = document.getElementById('countPerPage').value;
    const pages = document.getElementById('pages').value;

    if (!keyword) {
        alert('请输入关键词');
        return;
    }

    if (sourceIds.length === 0) {
        alert('请选择至少一个采集源');
        return;
    }

    const btn = document.getElementById('collectBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 采集中...';

    const formData = new FormData();
    formData.append('keyword', keyword);
    formData.append('count_per_page', countPerPage);
    formData.append('pages', pages);
    sourceIds.forEach(id => formData.append('source_ids', id));
    
    const xsrfInput = document.querySelector('input[name="_xsrf"]');
    if (xsrfInput) {
        formData.append('_xsrf', xsrfInput.value);
    }

    try {
        const response = await fetch('/admin/watch/collect', {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (result.success) {
            showResults(result.results);
        } else {
            alert(result.message || '采集失败');
        }
    } catch (error) {
        alert('请求失败: ' + error.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '🚀 开始采集';
    }
}

function showResults(results) {
    const box = document.getElementById('resultsBox');
    const list = document.getElementById('resultsList');
    list.innerHTML = '';

    results.forEach(r => {
        const item = document.createElement('div');
        item.className = 'result-item';
        let statusText = '';
        if (r.status === 'success') {
            statusText = `✓ 成功 (${r.count || 1}条)`;
        } else {
            statusText = '✗ 失败';
        }
        item.innerHTML = `
            <div class="result-info">
                <div class="result-source">${r.source}</div>
                <div class="result-page">第 ${r.page} 页</div>
                ${r.message ? `<div style="color: rgba(199, 69, 69, 0.7); font-size: 12px; margin-top: 4px;">${r.message}</div>` : ''}
            </div>
            <span class="result-status ${r.status}">${statusText}</span>
        `;
        list.appendChild(item);
    });

    box.classList.add('show');
}

document.getElementById('keywordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        startCollect();
    }
});

document.getElementById('searchBtn').addEventListener('click', startCollect);

async function loadAutoTasks() {
    try {
        const response = await fetch('/admin/watch/auto-task');
        const result = await response.json();
        if (result.success) renderTaskList(result.tasks || []);
    } catch (e) {}
}

function renderTaskList(tasks) {
    const box = document.getElementById('taskList');
    if (!tasks || tasks.length === 0) {
        box.innerHTML = '<div style="color:rgba(95,95,95,.6);font-size:13px;">暂无自动任务</div>';
        return;
    }
    box.innerHTML = tasks.map(t => {
        const statusText = Number(t.status) === 1 ? '运行中' : '已暂停';
        const statusColor = Number(t.status) === 1 ? 'success' : 'error';
        return `
        <div class="result-item">
            <div class="result-info">
                <div class="result-source">${t.task_name} · 关键词：${t.keyword}</div>
                <div class="result-page">间隔 ${t.interval_minutes} 分钟 · 下次执行：${t.next_run_at || '-'}</div>
                <div style="font-size:12px;color:rgba(95,95,95,.6);margin-top:3px;">最近结果：${t.last_result || '暂无'}</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center;">
                <span class="result-status ${statusColor}">${statusText}</span>
                <button class="layui-btn layui-btn-xs" onclick="toggleAutoTask(${t.id}, ${Number(t.status) === 1 ? 0 : 1})">${Number(t.status) === 1 ? '暂停' : '启动'}</button>
                <button class="layui-btn layui-btn-xs" onclick="runAutoTask(${t.id})">立即执行</button>
                <button class="layui-btn layui-btn-danger layui-btn-xs" onclick="deleteAutoTask(${t.id})">删除</button>
            </div>
        </div>`;
    }).join('');
}

function getSelectedSourceIdsForTask() {
    const ids = getSelectedSources();
    return ids;
}

async function createAutoTask() {
    const taskName = document.getElementById('taskName').value.trim();
    const keyword = document.getElementById('taskKeyword').value.trim();
    const interval = document.getElementById('taskInterval').value;
    const pages = document.getElementById('taskPages').value;
    const sourceIds = getSelectedSourceIdsForTask();
    const countPerPage = document.getElementById('countPerPage').value;

    if (!taskName || !keyword) {
        layer.msg('请填写任务名称和关键词');
        return;
    }
    if (!sourceIds.length) {
        layer.msg('请先选择至少一个采集源');
        return;
    }

    const formData = new FormData();
    formData.append('action', 'create');
    formData.append('task_name', taskName);
    formData.append('keyword', keyword);
    formData.append('interval_minutes', interval);
    formData.append('pages', pages);
    formData.append('count_per_page', countPerPage);
    sourceIds.forEach(id => formData.append('source_ids', id));
    const xsrfInput = document.querySelector('input[name="_xsrf"]');
    if (xsrfInput) formData.append('_xsrf', xsrfInput.value);

    const resp = await fetch('/admin/watch/auto-task', { method: 'POST', body: formData });
    const json = await resp.json();
    if (json.success) {
        layer.msg('自动任务创建成功');
        if (window.appSpeak) window.appSpeak('自动采集任务创建成功');
        loadAutoTasks();
    } else {
        layer.msg(json.message || '创建失败');
    }
}

async function toggleAutoTask(taskId, status) {
    const formData = new FormData();
    formData.append('action', 'toggle');
    formData.append('task_id', String(taskId));
    formData.append('status', String(status));
    const xsrfInput = document.querySelector('input[name="_xsrf"]');
    if (xsrfInput) formData.append('_xsrf', xsrfInput.value);
    const resp = await fetch('/admin/watch/auto-task', { method: 'POST', body: formData });
    const json = await resp.json();
    if (json.success) {
        layer.msg(status === 1 ? '任务已启动' : '任务已暂停');
        loadAutoTasks();
    }
}

async function runAutoTask(taskId) {
    const formData = new FormData();
    formData.append('action', 'run_now');
    formData.append('task_id', String(taskId));
    const xsrfInput = document.querySelector('input[name="_xsrf"]');
    if (xsrfInput) formData.append('_xsrf', xsrfInput.value);
    const resp = await fetch('/admin/watch/auto-task', { method: 'POST', body: formData });
    const json = await resp.json();
    if (json.success) {
        layer.msg(json.message || '执行成功');
        if (window.appSpeak) window.appSpeak('自动采集任务执行完成');
        loadAutoTasks();
    } else {
        layer.msg(json.message || '执行失败');
    }
}

async function deleteAutoTask(taskId) {
    layer.confirm('确认删除该自动任务吗？', {icon:3, title:'删除确认'}, async function(index){
        layer.close(index);
        const formData = new FormData();
        formData.append('action', 'delete');
        formData.append('task_id', String(taskId));
        const xsrfInput = document.querySelector('input[name="_xsrf"]');
        if (xsrfInput) formData.append('_xsrf', xsrfInput.value);
        const resp = await fetch('/admin/watch/auto-task', { method: 'POST', body: formData });
        const json = await resp.json();
        if (json.success) {
            layer.msg('任务已删除');
            loadAutoTasks();
        }
    });
}

loadAutoTasks();
</script>
{% end %}
