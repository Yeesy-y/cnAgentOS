<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>智能瞭望系统 - 用户登录</title>
	<link rel="stylesheet" href="{{ static_url('dist/layui-v2.13.6/layui/css/layui.css') }}">
	<link rel="stylesheet" href="{{ static_url('dist/fontawesome-free-5.15.4-web/css/all.min.css') }}">
	<style>
		*{margin:0;padding:0;box-sizing:border-box;}
		html,body{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Microsoft YaHei",sans-serif;}
		.login-page{width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:linear-gradient(180deg,#efe4e9 0%,#bdbbbf 100%);position:relative;overflow:hidden;}
		.login-container{position:relative;z-index:1;width:420px;max-width:92vw;background:rgba(255,255,255,0.25);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.3);border-radius:28px;padding:48px 40px 40px;box-shadow:0 30px 80px rgba(95,95,95,0.25),0 0 0 1px rgba(255,255,255,0.15) inset;transition:transform 0.4s ease;}
		.login-container:hover{transform:translateY(-5px);}
		.login-header{text-align:center;margin-bottom:36px;}
		.login-logo{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;background:linear-gradient(135deg,#5f5f5f,#8a8a8a);border-radius:24px;margin-bottom:18px;box-shadow:0 12px 32px rgba(95,95,95,0.35);}
		.login-logo i{font-size:32px;color:#fff;}
		.login-header h1{color:#5f5f5f;font-size:24px;font-weight:700;letter-spacing:0.5px;margin-bottom:8px;}
		.login-header p{color:rgba(95,95,95,0.7);font-size:14px;}
		.login-form .layui-form-item{margin-bottom:24px;}
		.login-form .layui-input-wrap{position:relative;}
		.login-form .layui-input-wrap .layui-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#5f5f5f;font-size:18px;z-index:2;opacity:0.6;}
		.login-form .layui-input{height:52px;padding-left:50px;background:rgba(255,255,255,0.4);border:1.5px solid rgba(95,95,95,0.15);border-radius:16px;color:#5f5f5f;font-size:15px;transition:all 0.3s ease;}
		.login-form .layui-input:focus{border-color:#5f5f5f;box-shadow:0 0 0 4px rgba(95,95,95,0.1);background:rgba(255,255,255,0.6);}
		.login-form .layui-input::placeholder{color:rgba(95,95,95,0.4);}
		.login-btn{width:100%;height:52px;background:linear-gradient(135deg,#5f5f5f,#8a8a8a);border:none;border-radius:16px;color:#efe4e9;font-size:16px;font-weight:600;letter-spacing:3px;cursor:pointer;transition:all 0.3s ease;box-shadow:0 8px 24px rgba(95,95,95,0.35);margin-top:8px;}
		.login-btn:hover{background:linear-gradient(135deg,#8a8a8a,#5f5f5f);box-shadow:0 12px 32px rgba(95,95,95,0.45);transform:translateY(-2px);}
		.login-error{background:rgba(239,68,68,0.12);border:1.5px solid rgba(239,68,68,0.25);border-radius:14px;color:#C74545;padding:12px 16px;margin-bottom:20px;font-size:14px;display:flex;align-items:center;gap:10px;}
		.login-footer{text-align:center;margin-top:18px;color:rgba(95,95,95,0.55);font-size:12px;}
		.login-links{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
		.login-links a{color:rgba(95,95,95,0.75);font-size:13px;text-decoration:none;}
		.login-links a:hover{color:#5f5f5f;text-decoration:underline;}
		.remember-row{display:flex;justify-content:flex-start;align-items:center;gap:10px;margin-bottom:12px;}
	</style>
</head>
<body>
<div class="login-page">
	<div class="login-container">
		<div class="login-header">
			<div class="login-logo"><i class="fas fa-eye"></i></div>
			<h1>AI 智能瞭望系统</h1>
			<p>用户登录</p>
		</div>

		{% if error %}
		<div class="login-error">
			<i class="fas fa-exclamation-circle"></i>
			<span>{{ error }}</span>
		</div>
		{% end %}

		<form class="login-form" action="/login" method="post">
			{% module xsrf_form_html() %}
			<div class="layui-form-item">
				<div class="layui-input-wrap">
					<i class="layui-icon layui-icon-username"></i>
					<input type="text" name="username" placeholder="请输入用户名" autocomplete="username" class="layui-input" required {% if saved_username %}value="{{ saved_username }}"{% end %}>
				</div>
			</div>
			<div class="layui-form-item">
				<div class="layui-input-wrap">
					<i class="layui-icon layui-icon-password"></i>
					<input type="password" name="password" placeholder="请输入密码" autocomplete="current-password" class="layui-input" required>
				</div>
			</div>
			<div class="remember-row">
				<input type="checkbox" id="remember" name="remember" lay-skin="primary" title="记住账号" {% if saved_username %}checked{% end %}>
				<span style="color: rgba(95, 95, 95, 0.6); font-size: 13px;">记住账号（30天）</span>
			</div>
			<div class="layui-form-item">
				<button type="submit" class="login-btn" id="loginBtn">登 录</button>
			</div>
		</form>

		<div class="login-links">
			<a href="/register">没有账号？去注册</a>
			<a href="/admin/login">管理后台登录</a>
		</div>

		<div class="login-footer">&copy; 2026 AI 智能瞭望与智能问数系统</div>
	</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function(){
	var form = document.querySelector('.login-form');
	var btn = document.getElementById('loginBtn');
	form.addEventListener('submit', function(){
		btn.disabled = true;
		btn.textContent = '登录中...';
	});
});
</script>
</body>
</html>
