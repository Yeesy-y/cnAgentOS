<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能瞭望系统 - 管理后台登录</title>
    <link rel="stylesheet" href="{{ static_url('dist/layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('dist/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
        }
        .login-page {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 25% 25%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 75% 75%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }
        .login-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .login-particles span {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: particleRise linear infinite;
        }
        @keyframes particleRise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .login-container {
            position: relative;
            z-index: 1;
            width: 420px;
            max-width: 92vw;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 48px 40px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            transition: transform 0.3s ease;
        }
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .login-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }
        .login-logo i {
            font-size: 28px;
            color: #fff;
        }
        .login-header h1 {
            color: #f1f5f9;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .login-header p {
            color: #94a3b8;
            font-size: 13px;
        }
        .login-form .layui-form-item {
            margin-bottom: 24px;
        }
        .login-form .layui-input-wrap {
            position: relative;
        }
        .login-form .layui-input-wrap .layui-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 16px;
            z-index: 2;
        }
        .login-form .layui-input {
            height: 48px;
            padding-left: 44px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.25s ease;
        }
        .login-form .layui-input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: rgba(30, 41, 59, 0.8);
        }
        .login-form .layui-input::placeholder {
            color: #64748b;
        }
        .login-form .layui-form-checkbox {
            margin: 0;
            padding: 0;
        }
        .login-form .layui-form-checkbox span {
            color: #94a3b8;
            font-size: 13px;
        }
        .login-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
            margin-top: 8px;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.4);
            transform: translateY(-1px);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: #64748b;
            font-size: 12px;
        }
        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            color: #fca5a5;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .login-error i {
            font-size: 14px;
        }
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 36px 24px 28px;
                border-radius: 12px;
            }
            .login-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-particles">
        {% for i in range(30) %}<span style="left: {{ i * 3.3 }}%; animation-duration: {{ 8 + (i % 7) }}s; animation-delay: {{ i * 0.4 }}s;"></span>{% end %}
    </div>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-eye"></i>
            </div>
            <h1>AI 智能瞭望系统</h1>
            <p>管理后台登录</p>
        </div>

        {% if error %}
        <div class="login-error">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% end %}

        <form class="login-form" action="/admin/login" method="post">
            {% module xsrf_form_html() %}
            <div class="layui-form-item">
                <div class="layui-input-wrap">
                    <i class="layui-icon layui-icon-username"></i>
                    <input type="text" name="username" placeholder="请输入用户名" autocomplete="username" class="layui-input" required>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-wrap">
                    <i class="layui-icon layui-icon-password"></i>
                    <input type="password" name="password" placeholder="请输入密码" autocomplete="current-password" class="layui-input" required>
                </div>
            </div>
            <div class="remember-row">
                <input type="checkbox" id="remember" name="remember" lay-skin="primary" title="记住账号">
            </div>
            <div class="layui-form-item">
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
            </div>
        </form>
        <div class="login-footer">
            &copy; 2026 AI 智能瞭望与智能问数系统
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function(){
    var form = document.querySelector('.login-form');
    var btn = document.getElementById('loginBtn');

    form.addEventListener('submit', function(){
        btn.disabled = true;
        btn.textContent = '登录中...';
    });
});
</script>
</body>
</html>
