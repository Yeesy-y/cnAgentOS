<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ title if title else "智能问数" }}</title>
	<link rel="stylesheet" href="{{ static_url('dist/layui-v2.13.6/layui/css/layui.css') }}">
	<link rel="stylesheet" href="{{ static_url('dist/fontawesome-free-5.15.4-web/css/all.min.css') }}">
	<style>
		html,body{height:100%;margin:0;}
		.page{height:100%;display:flex;background:linear-gradient(135deg,#efe4e9 0%,#f5f0f5 100%);}
		.sidebar{width:320px;min-width:280px;max-width:360px;background:linear-gradient(180deg,#efe4e9 0%,#a2a1a4 100%);border-right:1px solid rgba(95,95,95,0.12);display:flex;flex-direction:column;}
		.brand{padding:18px 16px;display:flex;align-items:center;gap:10px;color:#5f5f5f;font-weight:800;}
		.brand i{font-size:20px;}
		.sidebar-section{padding:0 16px 14px;}
		.sidebar-card{background:rgba(255,255,255,0.65);border:1px solid rgba(95,95,95,0.08);border-radius:16px;padding:12px;}
		.sidebar-title{font-size:12px;color:rgba(95,95,95,0.7);margin-bottom:8px;}
		.history{margin-top:10px;}
		.history-item{padding:10px 10px;border-radius:12px;cursor:pointer;color:#5f5f5f;background:rgba(255,255,255,0.4);border:1px solid rgba(95,95,95,0.06);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
		.history-left{display:flex;align-items:center;gap:8px;min-width:0;}
		.history-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
		.history-pin{font-size:12px;color:rgba(95,95,95,0.7);}
		.history-actions{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
		.hist-menu-btn{width:26px;height:26px;border-radius:10px;border:1px solid rgba(95,95,95,0.12);background:rgba(255,255,255,0.55);color:#5f5f5f;display:flex;align-items:center;justify-content:center;cursor:pointer;}
		.hist-menu-btn:hover{background:rgba(189,187,191,0.35);}
		.history-item:hover{background:rgba(189,187,191,0.35);}
		.history-item.active{background:linear-gradient(135deg,#5f5f5f 0%,#8a8a8a 100%);color:#efe4e9;border-color:transparent;}
		.history-item.active .hist-menu-btn{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.15);color:#efe4e9;}
		.history-item.active .history-pin{color:rgba(239,228,233,0.9);}
		.main{flex:1;display:flex;flex-direction:column;}
		.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(255,255,255,0.55);border-bottom:1px solid rgba(95,95,95,0.08);backdrop-filter:blur(10px);}
		.topbar .user{color:#5f5f5f;}
		.chat{flex:1;overflow:auto;padding:20px;}
		.msg{display:flex;gap:12px;margin-bottom:16px;}
		.avatar{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#efe4e9;flex:0 0 auto;}
		.avatar.user{background:linear-gradient(135deg,#5f5f5f 0%,#8a8a8a 100%);}
		.avatar.ai{background:linear-gradient(135deg,#bdbbbf 0%,#a2a1a4 100%);color:#5f5f5f;}
		.bubble{max-width:820px;background:rgba(255,255,255,0.72);border:1px solid rgba(95,95,95,0.08);border-radius:16px;padding:12px 14px;color:#333;white-space:pre-wrap;word-break:break-word;}
		.bubble.user{background:rgba(255,255,255,0.55);}
		.composer{padding:16px 18px;border-top:1px solid rgba(95,95,95,0.08);background:rgba(255,255,255,0.55);backdrop-filter:blur(10px);}
		.composer-row{display:flex;gap:10px;align-items:flex-end;}
		.input{flex:1;min-height:44px;max-height:160px;resize:vertical;border-radius:14px;border:1.5px solid rgba(95,95,95,0.15);background:rgba(255,255,255,0.8);padding:10px 12px;color:#5f5f5f;}
		.send{height:44px;border:none;border-radius:14px;padding:0 18px;background:linear-gradient(135deg,#5f5f5f 0%,#8a8a8a 100%);color:#efe4e9;font-weight:700;cursor:pointer;}
		.send:disabled{opacity:0.6;cursor:not-allowed;}
		.small-tip{margin-top:8px;color:rgba(95,95,95,0.65);font-size:12px;}
		pre code{display:block;overflow:auto;background:rgba(95,95,95,0.06);padding:10px;border-radius:12px;}
		code{background:rgba(95,95,95,0.06);padding:2px 6px;border-radius:8px;}
		.api-card{background:rgba(255,255,255,0.82);border:1px solid rgba(95,95,95,0.10);border-radius:16px;padding:12px 14px;}
		.api-card-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
		.api-card-title .name{font-weight:800;color:#5f5f5f;}
		.api-card-title .meta{font-size:12px;color:rgba(95,95,95,0.75);}
		.weather-main{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
		.weather-temp{font-size:36px;font-weight:900;color:#5f5f5f;line-height:1;}
		.weather-desc{margin-top:6px;color:rgba(95,95,95,0.85);font-weight:700;}
		.weather-kv{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
		.weather-tag{background:rgba(95,95,95,0.06);border:1px solid rgba(95,95,95,0.08);border-radius:12px;padding:6px 10px;font-size:12px;color:#5f5f5f;}
		.forecast{margin-top:10px;border-top:1px dashed rgba(95,95,95,0.16);padding-top:10px;display:flex;flex-direction:column;gap:8px;}
		.forecast-row{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:rgba(95,95,95,0.9);}
		.music-wrap{display:flex;gap:12px;align-items:center;}
		.music-cover{width:56px;height:56px;border-radius:14px;object-fit:cover;border:1px solid rgba(95,95,95,0.12);}
		.music-meta{min-width:0;flex:1;}
		.music-name{font-weight:900;color:#5f5f5f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
		.music-singer{font-size:12px;color:rgba(95,95,95,0.75);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
		.music-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto;}
		.music-btn{height:32px;padding:0 12px;border-radius:12px;border:none;background:linear-gradient(135deg,#5f5f5f 0%,#8a8a8a 100%);color:#efe4e9;font-weight:800;cursor:pointer;}
		.music-btn.secondary{background:rgba(95,95,95,0.08);color:#5f5f5f;border:1px solid rgba(95,95,95,0.12);}
		.json-details{margin-top:10px;}
		.json-details summary{cursor:pointer;color:rgba(95,95,95,0.8);font-size:12px;}
		.json-details pre{margin-top:8px;}
	</style>
</head>
<body>
<div class="page">
	<div class="sidebar">
		<div style="padding:16px;display:flex;align-items:center;gap:12px;">
			<button onclick="window.location.href='/home'" style="background:transparent;border:none;color:#5f5f5f;font-size:20px;cursor:pointer;">
				<i class="fas fa-arrow-left"></i>
			</button>
			<div class="brand" style="margin:0;padding:0;"><i class="fas fa-eye"></i> 智能问数</div>
		</div>
		<div class="sidebar-section">
			<div class="sidebar-card">
				<div class="sidebar-title">模型服务（后端模型引擎）</div>
				<select class="layui-select" id="modelSelect" style="width:100%; border-radius:12px;">
					<option value="">加载中...</option>
				</select>
				<div class="sidebar-title" style="margin-top:12px;">历史对话（任务）</div>
				<div class="history" id="historyList">
					<div style="color:rgba(95,95,95,0.65); font-size:12px;">暂无</div>
				</div>
				<button type="button" class="layui-btn layui-btn-primary" id="newChatBtn" style="width:100%;margin-top:10px;border-radius:12px;">新建对话</button>
			</div>
		</div>
		<div class="sidebar-section" style="margin-top:auto;">
			<form action="/logout" method="post">
				{% module xsrf_form_html() %}
				<button type="submit" class="layui-btn layui-btn-danger" style="width:100%;border-radius:12px;">退出登录</button>
			</form>
		</div>
	</div>

	<div class="main">
		<div class="topbar">
			<div style="color:#5f5f5f;font-weight:700;">ChatGPT/豆包风格对话（流式 + Markdown）</div>
			<div class="user">你好，{{ username }}</div>
		</div>
		<div class="chat" id="chatArea"></div>
		<div class="composer">
			<div class="composer-row">
				<textarea class="input" id="chatInput" placeholder="输入问题，支持 @数字员工（预留）..."></textarea>
				<button class="send" id="sendBtn">发送</button>
			</div>
			<div class="small-tip">提示：需要“智能问数”时可问「最新一条数据是什么？」；@xxx 数字员工将后续接入。</div>
		</div>
	</div>
</div>

<div style="display:none;">{% module xsrf_form_html() %}</div>

<script src="{{ static_url('dist/layui-v2.13.6/layui/layui.js') }}"></script>
<script>
layui.use(['layer', 'jquery', 'dropdown'], function(){
	var layer = layui.layer;
	var $ = layui.jquery;
	var dropdown = layui.dropdown;

	var currentConversationId = 0;
	var currentAssistantEl = null;
	var activeEventSource = null;

	function escapeHtml(s){
		return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
	}

	function renderMarkdown(md){
		var text = String(md || '');
		text = text.replace(/```([a-zA-Z0-9_-]+)?\n([\s\S]*?)```/g, function(_, lang, code){
			return '<pre><code>' + escapeHtml(code) + '</code></pre>';
		});
		text = text.replace(/`([^`]+)`/g, function(_, code){
			return '<code>' + escapeHtml(code) + '</code>';
		});
		text = text.replace(/^###\s(.+)$/gm, '<h3>$1</h3>');
		text = text.replace(/^##\s(.+)$/gm, '<h2>$1</h2>');
		text = text.replace(/^#\s(.+)$/gm, '<h1>$1</h1>');
		text = text.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
		text = text.replace(/\n/g, '<br>');
		return text;
	}

	function extractJsonFromText(text){
		var raw = String(text || '').trim();
		if(!raw){
			return null;
		}
		var m = raw.match(/```(?:json)?\n([\s\S]*?)```/i);
		if(m && m[1]){
			raw = String(m[1] || '').trim();
		}
		if(!raw){
			return null;
		}
		try{
			return JSON.parse(raw);
		}catch(e){
			return null;
		}
	}

	function safeUrl(u){
		var s = String(u || '').trim().replace(/\s+/g, '');
		if(s.indexOf('http://') === 0){
			s = 'https://' + s.slice('http://'.length);
		}
		return s;
	}

	function proxyMediaUrl(u){
		var s = String(u || '').trim();
		if(!s){
			return '';
		}
		if(s.indexOf('http://') === 0 || s.indexOf('https://') === 0){
			return '/user/api/media/proxy?url=' + encodeURIComponent(s);
		}
		return s;
	}

	function renderWeatherCard(d){
		if(!d || !d.city || (!d.weather && !d.temp)){
			return '';
		}
		var city = String(d.city || '');
		var time = String(d.time || '');
		var temp = d.temp !== undefined ? String(d.temp) : '';
		var tempn = d.tempn !== undefined ? String(d.tempn) : '';
		var weather = String(d.weather || '');
		var wind = String(d.wind || '');
		var windSpeed = String(d.windSpeed || '');
		var humidity = d.current && d.current.humidity ? String(d.current.humidity) : '';
		var pressure = d.current && d.current.pressure ? String(d.current.pressure) : '';
		var visibility = d.current && d.current.visibility ? String(d.current.visibility) : '';

		var forecast = d.forecast || d.future || d.days || null;
		var forecastRows = '';
		if(Array.isArray(forecast) && forecast.length){
			forecast.slice(0, 3).forEach(function(it){
				var day = it.date || it.day || it.time || it.week || '';
				var w = it.weather || it.wea || it.type || '';
				var t = it.temp || it.temperature || '';
				forecastRows += '<div class="forecast-row"><div>' + escapeHtml(String(day || '')) + '</div><div>' + escapeHtml(String(w || '')) + '</div><div>' + escapeHtml(String(t || '')) + '</div></div>';
			});
		}

		var kv = '';
		if(wind){ kv += '<span class="weather-tag">风向：' + escapeHtml(wind) + '</span>'; }
		if(windSpeed){ kv += '<span class="weather-tag">风速：' + escapeHtml(windSpeed) + '</span>'; }
		if(humidity){ kv += '<span class="weather-tag">湿度：' + escapeHtml(humidity) + '</span>'; }
		if(pressure){ kv += '<span class="weather-tag">气压：' + escapeHtml(pressure) + '</span>'; }
		if(visibility){ kv += '<span class="weather-tag">能见度：' + escapeHtml(visibility) + '</span>'; }

		return '' +
			'<div class="api-card weather-card">' +
				'<div class="api-card-title">' +
					'<div class="name">天气卡片</div>' +
					'<div class="meta">' + escapeHtml(city) + (time ? ' · ' + escapeHtml(time) : '') + '</div>' +
				'</div>' +
				'<div class="weather-main">' +
					'<div>' +
						'<div class="weather-temp">' + escapeHtml(temp) + '°</div>' +
						'<div class="weather-desc">' + escapeHtml(weather || '') + (tempn ? '（体感 ' + escapeHtml(tempn) + '°）' : '') + '</div>' +
					'</div>' +
				'</div>' +
				'<div class="weather-kv">' + kv + '</div>' +
				(forecastRows ? '<div class="forecast">' + forecastRows + '</div>' : '') +
			'</div>';
	}

	function renderMusicCard(d){
		if(!d || (!d.song && !d.singer && !d.Music && !d.cover)){
			return '';
		}
		var song = String(d.song || '');
		var singer = String(d.singer || '');
		var cover = proxyMediaUrl(safeUrl(d.cover || ''));
		var audioUrl = proxyMediaUrl(safeUrl(d.Music || d.music || ''));
		if(!audioUrl){
			return '';
		}
		var coverHtml = cover ? '<img class="music-cover" src="' + escapeHtml(cover) + '" alt="cover">' : '<div class="music-cover" style="display:flex;align-items:center;justify-content:center;background:rgba(95,95,95,0.06);"><i class="fas fa-music"></i></div>';
		return '' +
			'<div class="api-card music-card" data-audio="' + escapeHtml(audioUrl) + '">' +
				'<div class="api-card-title">' +
					'<div class="name">音乐播放器</div>' +
					'<div class="meta">随机推荐</div>' +
				'</div>' +
				'<div class="music-wrap">' +
					coverHtml +
					'<div class="music-meta">' +
						'<div class="music-name">' + escapeHtml(song || '未知歌曲') + '</div>' +
						'<div class="music-singer">' + escapeHtml(singer || '') + '</div>' +
					'</div>' +
					'<div class="music-actions">' +
						'<button type="button" class="music-btn music-play">播放</button>' +
						'<button type="button" class="music-btn secondary music-open">打开</button>' +
					'</div>' +
				'</div>' +
				'<audio preload="none" src="' + escapeHtml(audioUrl) + '"></audio>' +
			'</div>';
	}

	function renderAssistantContent(content){
		var obj = extractJsonFromText(content);
		if(obj){
			var payload = obj;
			if(obj && obj.data && typeof obj.data === 'object'){
				payload = obj.data;
			}
			var card = '';
			card = renderWeatherCard(payload) || renderMusicCard(payload);
			if(card){
				return card;
			}
		}
		return renderMarkdown(content);
	}

	function addMessage(role, content){
		var isUser = role === 'user';
		var $msg = $('<div class="msg"></div>');
		var $avatar = $('<div class="avatar"></div>');
		$avatar.addClass(isUser ? 'user' : 'ai');
		$avatar.html(isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>');
		var $bubble = $('<div class="bubble"></div>');
		$bubble.addClass(isUser ? 'user' : 'ai');
		$bubble.html(isUser ? escapeHtml(content) : renderAssistantContent(content));
		$msg.append($avatar).append($bubble);
		$('#chatArea').append($msg);
		$('#chatArea').scrollTop($('#chatArea')[0].scrollHeight);
		return $bubble;
	}

	function setSendDisabled(disabled){
		$('#sendBtn').prop('disabled', disabled);
	}

	function loadModels(){
		$.getJSON('/user/api/models', function(resp){
			if(!resp || !resp.success){
				layer.msg('模型列表加载失败', {icon:2});
				return;
			}
			var $sel = $('#modelSelect');
			$sel.empty();
			(resp.data || []).forEach(function(m){
				var name = m.model_name + ' (' + m.model_code + ')';
				var opt = $('<option></option>').attr('value', m.id).text(name);
				if(m.is_default === 1){
					opt.attr('selected', 'selected');
				}
				$sel.append(opt);
			});
		});
	}

	function loadHistory(){
		$.getJSON('/user/api/conversations', function(resp){
			var $list = $('#historyList');
			$list.empty();
			if(!resp || !resp.success){
				$list.append('<div style="color:rgba(95,95,95,0.65); font-size:12px;">加载失败</div>');
				return;
			}
			var data = resp.data || [];
			if(data.length === 0){
				$list.append('<div style="color:rgba(95,95,95,0.65); font-size:12px;">暂无</div>');
				return;
			}
			data.forEach(function(item){
				var $it = $('<div class="history-item"></div>');
				$it.attr('data-id', item.id);
				$it.attr('data-pinned', item.is_pinned ? '1' : '0');
				if(item.id === currentConversationId){
					$it.addClass('active');
				}
				var $left = $('<div class="history-left"></div>');
				var $pin = $('<span class="history-pin"></span>');
				if(item.is_pinned){
					$pin.html('<i class="layui-icon layui-icon-top"></i>');
				}
				var $title = $('<div class="history-title"></div>').text(item.title || ('对话 #' + item.id));
				$left.append($pin).append($title);

				var $actions = $('<div class="history-actions"></div>');
				var $menuBtn = $('<div class="hist-menu-btn" title="设置"><i class="layui-icon layui-icon-more"></i></div>');
				$menuBtn.attr('data-id', item.id);
				$menuBtn.attr('data-title', item.title || '');
				$menuBtn.attr('data-pinned', item.is_pinned ? '1' : '0');
				$actions.append($menuBtn);

				$it.append($left).append($actions);
				$list.append($it);
			});

			$('.hist-menu-btn').each(function(){
				var $btn = $(this);
				if($btn.data('ddInit')){
					return;
				}
				$btn.data('ddInit', true);
				dropdown.render({
					elem: this,
					trigger: 'click',
					data: [
						{title: ($btn.attr('data-pinned') === '1' ? '取消置顶' : '置顶'), id: 'pin_toggle'},
						{title: '分享', id: 'share'},
						{title: '重命名', id: 'rename'},
						{title: '举报', id: 'report'},
						{title: '删除', id: 'delete'}
					],
					click: function(obj){
						var cid = parseInt($btn.attr('data-id') || '0', 10);
						if(!cid){
							return;
						}
						if(obj.id === 'pin_toggle'){
							var pinned = $btn.attr('data-pinned') === '1';
							postConvAction(cid, pinned ? 'unpin' : 'pin', null, function(){
								loadHistory();
							});
							return;
						}
						if(obj.id === 'share'){
							var shareUrl = window.location.origin + '/chat?conversation_id=' + cid;
							if(navigator.clipboard && navigator.clipboard.writeText){
								navigator.clipboard.writeText(shareUrl).then(function(){
									layer.msg('链接已复制', {icon:1});
								}).catch(function(){
									layer.prompt({title:'分享链接（复制）', formType: 2, value: shareUrl}, function(v, idx){ layer.close(idx); });
								});
							} else {
								layer.prompt({title:'分享链接（复制）', formType: 2, value: shareUrl}, function(v, idx){ layer.close(idx); });
							}
							return;
						}
						if(obj.id === 'rename'){
							layer.prompt({title: '重命名对话', formType: 0, value: $btn.attr('data-title') || ''}, function(value, index){
								layer.close(index);
								postConvAction(cid, 'rename', value, function(){
									if(cid === currentConversationId){
										loadHistory();
									} else {
										loadHistory();
									}
								});
							});
							return;
						}
						if(obj.id === 'report'){
							postConvAction(cid, 'report', null, function(){
								layer.msg('已收到举报（预留）', {icon:1});
							});
							return;
						}
						if(obj.id === 'delete'){
							layer.confirm('确认删除该历史对话吗？', function(index){
								layer.close(index);
								postConvAction(cid, 'delete', null, function(){
									if(cid === currentConversationId){
										newChat();
									} else {
										loadHistory();
									}
								});
							});
							return;
						}
					}
				});
			});
		});
	}

	function postConvAction(conversationId, action, title, ok){
		var xsrf = $('input[name=\"_xsrf\"]').val();
		var data = {conversation_id: conversationId, action: action, _xsrf: xsrf};
		if(title !== null && title !== undefined){
			data.title = title;
		}
		$.ajax({
			url: '/user/api/conversation/action',
			type: 'POST',
			contentType: 'application/x-www-form-urlencoded; charset=UTF-8',
			dataType: 'json',
			headers: {"X-XSRFToken": xsrf},
			data: $.param(data),
			success: function(resp){
				if(resp && resp.success){
					if(ok){ ok(); }
				} else {
					layer.msg((resp && resp.message) ? resp.message : '操作失败', {icon:2});
				}
			},
			error: function(){
				layer.msg('操作失败', {icon:2});
			}
		});
	}

	function loadMessages(cid){
		$.getJSON('/user/api/messages?conversation_id=' + cid, function(resp){
			$('#chatArea').empty();
			if(!resp || !resp.success){
				addMessage('assistant', '加载失败');
				return;
			}
			(resp.data || []).forEach(function(m){
				addMessage(m.role, m.content);
			});
		});
	}

	function newChat(){
		currentConversationId = 0;
		$('#chatArea').empty();
		addMessage('assistant', '你好，我是你的AI助手。你可以直接提问，也可以使用 @数字员工（预留）。');
		loadHistory();
	}

	function stopStream(){
		if(activeEventSource){
			activeEventSource.close();
			activeEventSource = null;
		}
	}

	function sendMessage(){
		var text = ($('#chatInput').val() || '').trim();
		if(!text){
			layer.msg('请输入内容', {icon:2});
			return;
		}
		stopStream();
		setSendDisabled(true);
		$('#chatInput').val('');
		addMessage('user', text);
		currentAssistantEl = addMessage('assistant', '思考中...');

		var xsrf = $('input[name="_xsrf"]').val();
		var modelId = $('#modelSelect').val() || '';

		$.ajax({
			url: '/user/api/send',
			type: 'POST',
			contentType: 'application/x-www-form-urlencoded; charset=UTF-8',
			dataType: 'text',
			headers: {"X-XSRFToken": xsrf},
			data: $.param({
				message: text,
				conversation_id: currentConversationId,
				model_service_id: modelId,
				_xsrf: xsrf
			}),
			success: function(raw){
				var resp = null;
				try{
					resp = JSON.parse(raw || '{}');
				}catch(e){
					var preview = String(raw || '').slice(0, 200);
					currentAssistantEl.html(renderMarkdown('发送失败：接口返回非JSON\\n\\n' + '```\\n' + preview + '\\n```'));
					setSendDisabled(false);
					return;
				}
				if(!resp || !resp.success){
					currentAssistantEl.html(renderMarkdown('发送失败：' + (resp && resp.message ? resp.message : '未知错误')));
					setSendDisabled(false);
					return;
				}
				currentConversationId = resp.conversation_id || 0;
				loadHistory();
				var streamUrl = resp.stream_url;
				if(!streamUrl){
					currentAssistantEl.html(renderMarkdown('未返回stream_url'));
					setSendDisabled(false);
					return;
				}
				var fullText = '';
				activeEventSource = new EventSource(streamUrl);
				activeEventSource.onmessage = function(ev){
					if(!ev || !ev.data){
						return;
					}
					if(ev.data === '[DONE]'){
						currentAssistantEl.html(renderAssistantContent(fullText));
						stopStream();
						setSendDisabled(false);
						loadHistory();
						return;
					}
					fullText += ev.data;
					currentAssistantEl.html(renderAssistantContent(fullText));
					$('#chatArea').scrollTop($('#chatArea')[0].scrollHeight);
				};
				activeEventSource.onerror = function(){
					stopStream();
					setSendDisabled(false);
				};
			},
			error: function(xhr, status, error){
				var statusCode = xhr && xhr.status ? xhr.status : 0;
				var respText = xhr && xhr.responseText ? String(xhr.responseText).slice(0, 200) : '';
				var msg = '发送失败：' + (status || 'error') + ' ' + (error || '') + ' (HTTP ' + statusCode + ')';
				if(respText){
					msg += '\\n\\n```\\n' + respText + '\\n```';
				}
				currentAssistantEl.html(renderMarkdown(msg));
				setSendDisabled(false);
			}
		});
	}

	$(document).on('click', '.history-item', function(e){
		if($(e.target).closest('.hist-menu-btn').length){
			return;
		}
		var cid = parseInt($(this).attr('data-id') || '0', 10);
		if(!cid){
			return;
		}
		stopStream();
		currentConversationId = cid;
		loadHistory();
		loadMessages(cid);
	});

	$('#newChatBtn').on('click', function(){
		stopStream();
		newChat();
	});

	$('#sendBtn').on('click', function(){
		sendMessage();
	});

	$(document).on('click', '.music-open', function(){
		var $card = $(this).closest('.music-card');
		var url = $card.attr('data-audio') || '';
		if(url){
			window.open(url, '_blank');
		}
	});

	$(document).on('click', '.music-play', function(){
		var $btn = $(this);
		var $card = $btn.closest('.music-card');
		var audio = $card.find('audio')[0];
		if(!audio){
			return;
		}
		$('audio').each(function(){
			if(this !== audio){
				try{ this.pause(); }catch(e){}
			}
		});
		if(audio.paused){
			audio.play().then(function(){
				$('.music-play').text('播放');
				$btn.text('暂停');
			}).catch(function(){
				layer.msg('播放失败', {icon:2});
			});
		} else {
			audio.pause();
			$btn.text('播放');
		}
		audio.onended = function(){
			$btn.text('播放');
		};
	});

	$('#chatInput').on('keydown', function(e){
		if(e.key === 'Enter' && !e.shiftKey){
			e.preventDefault();
			sendMessage();
		}
	});

	loadModels();
	loadHistory();
	(function initFromUrl(){
		try{
			var qs = new URLSearchParams(window.location.search || '');
			var cid = parseInt(qs.get('conversation_id') || '0', 10);
			if(cid){
				currentConversationId = cid;
				loadHistory();
				loadMessages(cid);
				return;
			}
		}catch(e){}
		newChat();
	})();
});
</script>
</body>
</html>
