                                        $(document).off('click', '.invite-friend-checkbox');
                                        $(document).off('click', '.invite-employee-item');
                                        $(document).off('click', '.invite-employee-checkbox');
                                        $(document).on('click', '.invite-friend-checkbox', function(e) {
                                            e.stopPropagation();
                                        });
                                        $(document).on('click', '.invite-employee-checkbox', function(e) {
                                            e.stopPropagation();
                                        });
                                        $(document).on('click', '.invite-friend-item', function(e) {
                                            if ($(e.target).hasClass('invite-friend-checkbox')) {
                                                return;
                                            }
                                            var checkbox = $(this).find('.invite-friend-checkbox');
                                            checkbox.prop('checked', !checkbox.prop('checked'));
                                        });
                                        $(document).on('click', '.invite-employee-item', function(e) {
                                            if ($(e.target).hasClass('invite-employee-checkbox')) {
                                                return;
                                            }
                                            var checkbox = $(this).find('.invite-employee-checkbox');
                                            checkbox.prop('checked', !checkbox.prop('checked'));
                                        });
                                    },
                                    yes: function(index) {
                                        var selectedFriends = [];
                                        var layerContent = $('#layui-layer' + index + ' .invite-friend-checkbox:checked');
                                        layerContent.each(function() {
                                            selectedFriends.push($(this).closest('.invite-friend-item').data('username'));
                                        });
                                        
                                        var selectedEmployees = [];
                                        var empContent = $('#layui-layer' + index + ' .invite-employee-checkbox:checked');
                                        empContent.each(function() {
                                            selectedEmployees.push($(this).closest('.invite-employee-item').data('employeeid'));
                                        });
                                        
                                        if (selectedFriends.length === 0 && selectedEmployees.length === 0) {
                                            layer.msg('请选择要邀请的成员', { icon: 0 });
                                            return;
                                        }
                                        
                                        $.ajax({
                                            url: '/user/api/group/invite',
                                            type: 'POST',
                                            headers: {"X-XSRFToken": $('input[name="_xsrf"]').val()},
                                            data: JSON.stringify({
                                                group_id: selectedContact.id,
                                                friends: selectedFriends,
                                                employees: selectedEmployees
                                            }),
                                            contentType: 'application/json',
                                            success: function(inviteRes) {
                                                if (inviteRes.success) {
                                                    layer.msg('邀请成功！', { icon: 1 });
                                                } else {
                                                    layer.msg('邀请失败：' + inviteRes.message, { icon: 2 });
                                                }
                                            },
                                            error: function() {
                                                layer.msg('网络错误，请重试', { icon: 2 });
                                            }
                                        });
                                        layer.close(index);
                                    }
                                });
                            },
                            error: function() {
                                layer.msg('获取数字员工列表失败', { icon: 2 });
                            }
                        });
                    },
                    error: function() {
                        layer.msg('获取好友列表失败', { icon: 2 });
                    }
                });
            });
            
            $('#messageInput').on('input', function() {
                $('#sendBtn').prop('disabled', !$.trim($(this).val()));
            });
            
            $('#messageInput').on('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            $('#sendBtn').on('click', sendMessage);
            
            $(document).on('click', '.tab-btn', function() {
                $('.tab-btn').removeClass('active');
                $(this).addClass('active');
                var tab = $(this).data('tab');
                
                if (tab === 'friends') {
                    $('#contactList').show();
                    $('#friendRequestList').hide();
                    $.ajax({
                        url: '/user/api/friends',
                        type: 'GET',
                        success: function(res) {
                            if (res.success) {
                                contacts.friends = res.friends || [];
                                renderContacts('friends');
                            }
                        }
                    });
                } else if (tab === 'groups') {
                    $('#contactList').show();
                    $('#friendRequestList').hide();
                    $.ajax({
                        url: '/user/api/groups',
                        type: 'GET',
                        success: function(res) {
                            if (res.success) {
                                contacts.groups = res.groups || [];
                                renderContacts('groups');
                            }
                        }
                    });
                } else if (tab === 'bots') {
                    $('#contactList').show();
                    $('#friendRequestList').hide();
                    $.ajax({
                        url: '/user/api/employees',
                        type: 'GET',
                        success: function(res) {
                            if (res.success) {
                                contacts.bots = res.employees || [];
                                renderContacts('bots');
                            }
                        }
                    });
                } else if (tab === 'requests') {
                    $('#contactList').hide();
                    $('#friendRequestList').show();
                    loadFriendRequests();
                }
            });

            // 字母索引点击事件
            $(document).on('click', '.alphabet-index span', function(e) {
                e.stopPropagation();
                var letter = $(this).data('letter');
                scrollToLetter(letter);
            });

            // 联系人列表滚动时更新字母索引高亮状态
            $('#contactList').on('scroll', function() {
                var scrollTop = $(this).scrollTop();
                var containerHeight = $(this).height();
                var containerTop = $(this).offset().top;
                
                $('.group-title').each(function() {
                    var titleTop = $(this).offset().top - containerTop + scrollTop;
                    var titleHeight = $(this).height();
                    
                    if (titleTop <= scrollTop + 20 && titleTop + titleHeight > scrollTop) {
                        var letter = $(this).attr('id').replace('group-', '');
                        $('.alphabet-index span').removeClass('active');
                        $('.alphabet-index span[data-letter="' + letter + '"]').addClass('active');
                        return false;
                    }
                });
            });
            
            $(document).on('click', '.message-avatar.clickable', function(e) {
                e.stopPropagation();
                var username = $(this).data('username');
                console.log('点击头像，用户名:', username);
                
                if (!username || username.trim() === '') {
                    layer.msg('无法识别用户', { icon: 2 });
                    return;
                }

                var existingBot = null;
                if (contacts.bots) {
                    for (var j = 0; j < contacts.bots.length; j++) {
                        if (contacts.bots[j].name === username) {
                            existingBot = contacts.bots[j];
                            break;
                        }
                    }
                }
                
                if (existingBot) {
                    existingBot.is_employee = true;
                    selectedContact = existingBot;
                    updateChatHeader(selectedContact);
                    renderMessages(selectedContact.id);
                    return;
                }
                
                var existingFriend = null;
                for (var i = 0; i < contacts.friends.length; i++) {
                    if (contacts.friends[i].name === username) {
                        existingFriend = contacts.friends[i];
                        break;
                    }
                }
                
                if (existingFriend) {
                    console.log('找到好友，直接切换:', existingFriend);
                    selectedContact = existingFriend;
                    updateChatHeader(selectedContact);
                    renderMessages(selectedContact.id);
                } else {
                    console.log('创建临时对话:', username);
                    var temporaryContact = {
                        id: 'temp_' + username,
                        name: username,
                        avatar: username[0].toUpperCase(),
                        type: 'friend',
                        preview: '',
                        time: '刚刚',
                        badge: 0
                    };
                    selectedContact = temporaryContact;
                    updateChatHeader(selectedContact);
                    renderMessages(selectedContact.id);
                    layer.msg('已打开与' + username + '的临时对话', { icon: 1, time: 1500 });
                }
            });
            
            $('#addFriendChatBtn').on('click', function() {
                if (!selectedContact) return;
                
                var username = selectedContact.name;
                layer.confirm('确认添加' + username + '为好友？', {
                    icon: 3,
                    title: '确认添加'
                }, function(confirmIndex) {
                    $.ajax({
                        url: '/user/api/friend/request',
                        type: 'POST',
                        data: JSON.stringify({
                            username: username
                        }),
                        contentType: 'application/json',
                        success: function(addRes) {
                            if (addRes.success) {
                                layer.msg(addRes.message, {icon: 1});
                                loadFriendRequests();
                            } else {
                                layer.msg(addRes.message, {icon: 2});
                            }
                        },
                        error: function() {
                            layer.msg('网络错误，请重试', {icon: 2});
                        }
                    });
                    layer.close(confirmIndex);
                });
            });
            
            $(document).on('click', '.request-btn', function() {
                var action = $(this).data('action');
                var username = $(this).data('username');
                var requestItem = $(this).closest('.request-item');
                
                if (action === 'accept') {
                    $.ajax({
                        url: '/user/api/friend/accept',
                        type: 'POST',
                        data: JSON.stringify({username: username}),
                        contentType: 'application/json',
                        success: function(res) {
                            if (res.success) {
                                layer.msg('已同意好友请求', {icon: 1});
                                requestItem.remove();
                                pendingRequestCount--;
                                updateRequestBadge();
                                
                                for (var i = 0; i < contacts.requests.received.length; i++) {
                                    if (contacts.requests.received[i].username === username) {
                                        contacts.requests.received.splice(i, 1);
                                        break;
                                    }
                                }
                                
                                $.ajax({
                                    url: '/user/api/friends',
                                    type: 'GET',
                                    success: function(friendsRes) {
                                        if (friendsRes.success) {
                                            contacts.friends = friendsRes.friends || [];
                                            if (selectedContact && selectedContact.name === username) {
                                                updateChatHeader(selectedContact);
                                            }
                                        }
                                    }
                                });
                            } else {
                                layer.msg(res.message || '操作失败', {icon: 2});
                            }
                        },
                        error: function() {
                            layer.msg('网络错误，请重试', {icon: 2});
                        }
                    });
                } else if (action === 'reject') {
                    $.ajax({
                        url: '/user/api/friend/reject',
                        type: 'POST',
                        data: JSON.stringify({username: username}),
                        contentType: 'application/json',
                        success: function(res) {
                            if (res.success) {
                                layer.msg('已拒绝好友请求', {icon: 1});
                                requestItem.remove();
                                pendingRequestCount--;
                                updateRequestBadge();
                                
                                for (var i = 0; i < contacts.requests.received.length; i++) {
                                    if (contacts.requests.received[i].username === username) {
                                        contacts.requests.received.splice(i, 1);
                                        break;
                                    }
                                }
                            } else {
                                layer.msg(res.message || '操作失败', {icon: 2});
                            }
                        },
                        error: function() {
                            layer.msg('网络错误，请重试', {icon: 2});
                        }
                    });
                }
            });
            
            window.onbeforeunload = function() {
                if (ws) {
                    ws.close();
                }
            };
            
            $.ajax({
                url: '/user/api/friends',
                type: 'GET',
                success: function(res) {
                    if (res.success) {
                        contacts.friends = res.friends || [];
                        renderContacts('friends');
                    }
                }
            });
            
            $.ajax({
                url: '/user/api/employees',
                type: 'GET',
                success: function(res) {
                    if (res.success) {
                        contacts.bots = res.employees || [];
                    }
                }
            });
            
            // 搜索消息按钮
            $('#searchMessageBtn').on('click', function() {
                $('#searchMessageModal').show();
                $('#modalSearchInput').val('').focus();
                $('#searchResults').html('<div style="padding: 40px; text-align: center; color: #999;">输入关键词开始搜索</div>');
            });
            
            // 关闭搜索模态框
            $('#closeSearchModal').on('click', function() {
                $('#searchMessageModal').hide();
            });
            
            // 搜索输入
            var searchTimeout;
            $('#modalSearchInput').on('input', function() {
                var keyword = $(this).val();
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(function() {
                    searchMessages(keyword);
                }, 300);
            });
            
            // 搜索结果点击
            $(document).on('click', '.search-result-item', function() {
                var chatType = $(this).data('chat-type');
                var chatId = $(this).data('chat-id');
                $('#searchMessageModal').hide();
                
                if (chatType === 'group') {
                    // 找到对应的群聊
                    var group = contacts.groups.find(function(g) { return g.id === chatId; });
                    if (group) {
                        selectedContact = group;
                        updateChatHeader(selectedContact);
                        renderMessages(selectedContact.id);
                    }
                } else if (chatType === 'private') {
                    var friend = contacts.friends.find(function(f) { return f.name === chatId; });
                    if (friend) {
                        selectedContact = friend;
                        updateChatHeader(selectedContact);
                        renderMessages(selectedContact.id);
                    }
                }
            });
            
            // 消息操作按钮
            $(document).on('click', '.message-action-btn', function(e) {
                e.stopPropagation();
                var action = $(this).data('action');
                var messageId = $(this).data('message-id');
                var messageType = $(this).data('message-type');
                
                // 找到对应的消息内容
                var messageElement = $(this).closest('.message');
                var messageContent = messageElement.find('.message-content').text();
                if (messageContent.length > 100) {
                    messageContent = messageContent.substring(0, 100) + '...';
                }
                // 提取发送者
                var senderName = messageElement.hasClass('own') ? '我' : '对方';
                
                if (action === 'reply') {
                    startReply(messageId, messageType, messageContent, senderName);
                } else if (action === 'forward') {
                    showForwardModal(messageId, messageType);
                }
            });
            
            // 转发目标点击
            $(document).on('click', '.forward-target-item', function() {
                var type = $(this).data('type');
                var id = $(this).data('id');
                forwardMessage(type, id);
            });
            
            // 关闭转发模态框
            $('#closeForwardModal').on('click', function() {
                $('#forwardMessageModal').hide();
                currentForwardMessage = null;
            });
            
            // 取消回复
            $('#cancelReply').on('click', function() {
                cancelReply();
            });
            
            // 点击模态框外部关闭
            $(document).on('click', function(e) {
                if ($(e.target).is('#searchMessageModal')) {
                    $('#searchMessageModal').hide();
                }
                if ($(e.target).is('#forwardMessageModal')) {
                    $('#forwardMessageModal').hide();
                    currentForwardMessage = null;
                }
                if (!$(e.target).closest('#emojiPicker').length && !$(e.target).closest('#emojiBtn').length) {
                    $('#emojiPicker').removeClass('show');
                }
            });
            
            // 初始化表情选择器
            renderEmojiPicker();
            
            // 加载带未读数的联系
            loadContactsWithUnread();

            initWebSocket();
        });
    </script>
</body>
</html>
