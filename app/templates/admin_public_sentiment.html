{% extends "admin_base.html" %}
{% block content %}
<style>
    .sentiment-container {
        min-height: calc(100vh - 80px);
        padding: 24px;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
        position: relative;
        overflow-x: hidden;
    }

    .sentiment-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: 
            radial-gradient(circle at 30% 40%, rgba(255, 68, 68, 0.08) 0%, transparent 40%),
            radial-gradient(circle at 70% 60%, rgba(255, 193, 7, 0.06) 0%, transparent 40%),
            linear-gradient(45deg, rgba(255, 68, 68, 0.03) 1px, transparent 1px),
            linear-gradient(-45deg, rgba(255, 193, 7, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        z-index: 0;
        pointer-events: none;
    }

    .page-header {
        position: relative;
        z-index: 1;
        text-align: center;
        margin-bottom: 32px;
        padding: 28px 48px;
        background: linear-gradient(90deg, rgba(255, 68, 68, 0.15) 0%, rgba(255, 193, 7, 0.1) 100%);
        border-radius: 20px;
        border: 2px solid rgba(255, 68, 68, 0.4);
        box-shadow: 0 12px 48px rgba(255, 68, 68, 0.25);
    }

    .page-title {
        font-size: 48px;
        font-weight: 800;
        background: linear-gradient(90deg, #FF4444 0%, #FFC107 50%, #FF6B6B 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 60px rgba(255, 68, 68, 0.5);
        letter-spacing: 0.15em;
        margin-bottom: 12px;
    }

    .page-subtitle {
        font-size: 16px;
        color: rgba(167, 167, 167, 0.8);
        letter-spacing: 0.25em;
        text-transform: uppercase;
    }

    .alert-indicator {
        position: fixed;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #FF4444 0%, #FF6B6B 100%);
        border: 2px solid #FF0000;
        border-radius: 16px;
        padding: 16px 24px;
        color: white;
        z-index: 1000;
        box-shadow: 0 8px 32px rgba(255, 68, 68, 0.6);
        animation: pulse-alert 2s infinite;
        display: none;
    }

    .alert-indicator.show {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    @keyframes pulse-alert {
        0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(255, 68, 68, 0.6); }
        50% { transform: scale(1.05); box-shadow: 0 12px 48px rgba(255, 68, 68, 0.8); }
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        position: relative;
        z-index: 1;
        max-width: 1800px;
        margin: 0 auto;
    }

    .card {
        background: linear-gradient(145deg, rgba(26, 31, 58, 0.9) 0%, rgba(15, 20, 40, 0.95) 100%);
        border-radius: 20px;
        padding: 28px;
        border: 2px solid rgba(255, 68, 68, 0.3);
        box-shadow: 
            0 12px 48px rgba(0, 0, 0, 0.4),
            inset 0 1px 0 rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, #FF4444 0%, #FFC107 50%, #FF6B6B 100%);
        transform: scaleX(0);
        transition: transform 0.3s ease;
    }

    .card:hover::before {
        transform: scaleX(1);
    }

    .card.warning-border {
        border-color: rgba(255, 193, 7, 0.6);
        box-shadow: 0 12px 48px rgba(255, 193, 7, 0.2);
    }

    .card.danger-border {
        border-color: rgba(255, 68, 68, 0.8);
        box-shadow: 0 12px 48px rgba(255, 68, 68, 0.3);
    }

    .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
    }

    .card-title {
        font-size: 22px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.95);
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .card-title i {
        font-size: 24px;
    }

    .status-badge {
        padding: 8px 16px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
    }

    .status-low {
        background: linear-gradient(135deg, #10B981 0%, #059669 100%);
        color: white;
    }

    .status-medium {
        background: linear-gradient(135deg, #FFC107 0%, #FF9800 100%);
        color: #333;
    }

    .status-high {
        background: linear-gradient(135deg, #FF4444 0%, #DC143C 100%);
        color: white;
        animation: flashing 1.5s infinite;
    }

    @keyframes flashing {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
    }

    .analysis-result {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 16px;
        padding: 24px;
        margin-top: 20px;
        border-left: 4px solid;
    }

    .analysis-result.low {
        border-left-color: #10B981;
        background: rgba(16, 185, 129, 0.1);
    }

    .analysis-result.medium {
        border-left-color: #FFC107;
        background: rgba(255, 193, 7, 0.15);
    }

    .analysis-result.high {
        border-left-color: #FF4444;
        background: rgba(255, 68, 68, 0.15);
    }

    .risk-score-display {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-bottom: 20px;
    }

    .score-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: 800;
        position: relative;
        border: 6px solid;
    }

    .score-low {
        background: linear-gradient(135deg, #10B981, #059669);
        border-color: #059669;
        color: white;
    }

    .score-medium {
        background: linear-gradient(135deg, #FFC107, #FF9800);
        border-color: #FF9800;
        color: #333;
    }

    .score-high {
        background: linear-gradient(135deg, #FF4444, #DC143C);
        border-color: #FF0000;
        color: white;
        animation: pulse-score 1.5s infinite;
    }

    @keyframes pulse-score {
        0%, 100% { box-shadow: 0 0 20px rgba(255, 68, 68, 0.6); }
        50% { box-shadow: 0 0 40px rgba(255, 68, 68, 1); }
    }

    .score-label {
        font-size: 14px;
        color: rgba(167, 167, 167, 0.8);
    }

    .analysis-content {
        color: rgba(239, 239, 239, 0.9);
        line-height: 1.8;
        font-size: 15px;
    }

    .analysis-content strong {
        color: #FFD700;
    }

    .input-section {
        margin-bottom: 20px;
    }

    .text-input {
        width: 100%;
        min-height: 180px;
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(255, 68, 68, 0.3);
        border-radius: 12px;
        padding: 16px;
        color: rgba(239, 239, 239, 0.9);
        font-size: 15px;
        line-height: 1.6;
        resize: vertical;
        transition: all 0.3s ease;
    }

    .text-input:focus {
        outline: none;
        border-color: #FF4444;
        box-shadow: 0 0 0 4px rgba(255, 68, 68, 0.2);
    }

    .btn-analyze {
        width: 100%;
        padding: 16px 32px;
        background: linear-gradient(135deg, #FF4444 0%, #FF6B6B 100%);
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 16px;
    }

    .btn-analyze:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(255, 68, 68, 0.5);
    }

    .btn-analyze:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin-right: 8px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .keyword-warning {
        background: rgba(255, 68, 68, 0.15);
        border: 1px solid rgba(255, 68, 68, 0.4);
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        animation: slide-in 0.3s ease;
    }

    @keyframes slide-in {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .warning-icon {
        color: #FF4444;
        font-size: 20px;
    }

    .warning-content {
        flex: 1;
    }

    .warning-text {
        color: rgba(255, 255, 255, 0.9);
        font-size: 14px;
    }

    .warning-severity {
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .severity-high {
        background: #FF4444;
        color: white;
    }

    .severity-medium {
        background: #FFC107;
        color: #333;
    }

    .data-sources-section {
        margin-top: 32px;
    }

    .data-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
    }

    .data-table th {
        background: linear-gradient(135deg, rgba(255, 68, 68, 0.2) 0%, rgba(255, 193, 7, 0.15) 100%) !important;
        color: #FF4444 !important;
        padding: 16px;
        text-align: left;
        font-weight: 600;
        border-bottom: 2px solid rgba(255, 68, 68, 0.3);
    }

    .data-table td {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 68, 68, 0.15);
        color: rgba(239, 239, 239, 0.85);
    }

    .data-table tr:hover {
        background: rgba(255, 68, 68, 0.08);
    }

    .data-loading {
        text-align: center;
        padding: 40px;
        color: rgba(167, 167, 167, 0.6);
    }

    .source-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
    }

    .source-tab {
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 68, 68, 0.3);
        background: rgba(0, 0, 0, 0.3);
        color: rgba(239, 239, 239, 0.8);
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
    }

    .source-tab.active {
        background: linear-gradient(135deg, #FF4444, #FF6B6B);
        border-color: #FF4444;
        color: white;
    }

    .risk-stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 16px;
    }

    .risk-stat-card {
        background: rgba(255, 68, 68, 0.1);
        border: 1px solid rgba(255, 68, 68, 0.3);
        border-radius: 12px;
        padding: 16px;
    }

    .risk-stat-card h4 {
        color: #FFD700;
        margin: 0 0 12px 0;
        font-size: 14px;
    }

    .full-width-card {
        grid-column: 1 / -1;
    }

    /* 响应式设计 */
    @media (max-width: 1200px) {
        .dashboard-grid {
            grid-template-columns: 1fr;
        }
        
        .page-title {
            font-size: 36px;
        }
    }
</style>

<div class="sentiment-container">
    <div class="alert-indicator" id="globalAlert">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="alertText">检测到高风险内容！</span>
    </div>

    <div class="page-header">
        <div class="page-title">
            <i class="fas fa-shield-alt"></i> 智能舆情分析
        </div>
        <div class="page-subtitle">Intelligent Public Opinion & Risk Analysis System</div>
    </div>

    <div class="dashboard-grid">
        <!-- 文本风险分析 -->
        <div class="card" id="textAnalysisCard">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-keyboard"></i>
                    <span>实时文本分析</span>
                </div>
                <div class="status-badge status-low" id="textStatusBadge">安全</div>
            </div>
            
            <div class="input-section">
                <textarea 
                    class="text-input" 
                    id="textInput" 
                    placeholder="请输入需要分析的文本内容（支持聊天记录、监控数据等）..."
                ></textarea>
                <button class="btn-analyze" onclick="analyzeText()">
                    <span id="analyzeBtnText">开始风险评估</span>
                    <span id="analyzeSpinner" class="loading-spinner" style="display:none;"></span>
                </button>
            </div>
            
            <div id="textResult" style="display:none;">
                <div class="analysis-result low" id="textResultBox">
                    <div class="risk-score-display">
                        <div class="score-circle score-low" id="textScoreCircle">
                            <span id="textScore">2</span>
                        </div>
                        <div>
                            <div class="score-label">风险等级</div>
                            <div id="textRiskLevel" style="font-weight:bold;color:#10B981;margin-top:4px;">低风险</div>
                        </div>
                    </div>
                    <div class="analysis-content" id="textAnalysisContent">
                        正在分析...
                    </div>
                </div>
            </div>
        </div>

        <!-- 关键词预警 -->
        <div class="card" id="keywordWarningCard">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-search"></i>
                    <span>敏感词检测</span>
                </div>
                <div class="status-badge status-low" id="keywordStatusBadge">无异常</div>
            </div>
            
            <div id="keywordResults">
                <div id="keywordList" style="margin-top: 20px;">
                    <div style="text-align:center;padding:40px;color:rgba(167,167,167,0.6);">
                        暂无警告信息
                    </div>
                </div>
            </div>
        </div>

        <!-- 监控数据分析 -->
        <div class="card data-sources-section full-width-card" style="grid-column:1/-1;">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-radar"></i>
                    <span>瞭望数据采集分析</span>
                </div>
                <button onclick="loadWatchData()" style="background:linear-gradient(135deg, #FF4444, #FF6B6B);border:none;border-radius:8px;padding:8px 16px;color:white;font-size:13px;cursor:pointer;">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
            </div>
            
            <div id="watchDataContainer">
                <div class="data-loading">
                    <i class="fas fa-spinner fa-spin"></i> 加载中...
                </div>
            </div>
        </div>

        <!-- 聊天数据分析 -->
        <div class="card data-sources-section full-width-card" style="grid-column:1/-1;">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-comments"></i>
                    <span>聊天子系统数据分析（智能问数 / 智能聊天）</span>
                </div>
                <button onclick="loadChatData()" style="background:linear-gradient(135deg, #FF4444, #FF6B6B);border:none;border-radius:8px;padding:8px 16px;color:white;font-size:13px;cursor:pointer;">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
            </div>

            <div class="source-tabs">
                <div class="source-tab active" id="tabQa" onclick="switchChatTab('qa')">智能问数</div>
                <div class="source-tab" id="tabIm" onclick="switchChatTab('im')">智能聊天</div>
                <div class="source-tab" id="tabAll" onclick="switchChatTab('all')">全部</div>
            </div>
            
            <div id="chatDataContainer">
                <div class="data-loading">
                    <i class="fas fa-spinner fa-spin"></i> 加载中...
                </div>
            </div>
        </div>

        <!-- 高风险用户统计 -->
        <div class="card data-sources-section full-width-card" style="grid-column:1/-1;">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-user-shield"></i>
                    <span>高风险用户统计</span>
                </div>
                <button onclick="loadRiskStats()" style="background:linear-gradient(135deg, #FF4444, #FF6B6B);border:none;border-radius:8px;padding:8px 16px;color:white;font-size:13px;cursor:pointer;">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
            </div>
            <div id="riskStatsContainer">
                <div class="data-loading">
                    <i class="fas fa-spinner fa-spin"></i> 加载中...
                </div>
            </div>
        </div>
    </div>
</div>
{% end %}

{% block js %}
<script>
let currentAnalysisResult = null;
let chatDataCache = { qa_data: [], im_data: [], data: [] };
let currentChatTab = 'qa';

// 分析文本
async function analyzeText() {
    const textInput = document.getElementById('textInput');
    const text = textInput.value.trim();
    
    if (!text) {
        layui.layer.msg('请输入待分析的文本内容', {icon: 5});
        return;
    }
    
    // 显示加载状态
    document.getElementById('analyzeBtnText').innerHTML = '<span class="loading-spinner"></span> 分析中';
    document.getElementById('analyzeSpinner').style.display = 'inline-block';
    document.querySelector('.btn-analyze').disabled = true;
    
    try {
        const formData = new FormData();
        formData.append('type', 'text');
        formData.append('content', text);
        
        const response = await fetch('/api/public-sentiment/analyze', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
            showAnalysisResult(result.data);
            updateGlobalAlert(result.data.risk_level, result.data.warning_count);
        } else {
            layui.layer.msg(result.message || '分析失败', {icon: 5});
        }
    } catch (error) {
        layui.layer.msg('网络错误：' + error.message, {icon: 5});
    } finally {
        document.getElementById('analyzeBtnText').innerText = '开始风险评估';
        document.getElementById('analyzeSpinner').style.display = 'none';
        document.querySelector('.btn-analyze').disabled = false;
    }
}

// 显示分析结果
function showAnalysisResult(data) {
    currentAnalysisResult = data;
    const riskLevel = data.risk_level;
    const riskScore = data.risk_score;
    
    // 更新状态徽章
    const badge = document.getElementById('textStatusBadge');
    badge.className = 'status-badge status-' + riskLevel;
    badge.textContent = riskLevel === 'high' ? '高风险' : riskLevel === 'medium' ? '中风险' : '低风险';
    
    // 更新卡片边框
    const card = document.getElementById('textAnalysisCard');
    card.classList.remove('warning-border', 'danger-border');
    if (riskLevel === 'medium') {
        card.classList.add('warning-border');
    } else if (riskLevel === 'high') {
        card.classList.add('danger-border');
    }
    
    // 更新分数显示
    const scoreCircle = document.getElementById('textScoreCircle');
    scoreCircle.className = 'score-circle score-' + riskLevel;
    document.getElementById('textScore').textContent = riskScore;
    
    document.getElementById('textRiskLevel').textContent = 
        riskLevel === 'high' ? '高风险' : riskLevel === 'medium' ? '中风险' : '低风险';
    document.getElementById('textRiskLevel').style.color = 
        riskLevel === 'high' ? '#FF4444' : riskLevel === 'medium' ? '#FFC107' : '#10B981';
    
    // 更新结果框样式
    const resultBox = document.getElementById('textResultBox');
    resultBox.className = 'analysis-result ' + riskLevel;
    
    // 显示分析内容
    document.getElementById('textAnalysisContent').innerHTML = `<strong>分析报告：</strong><br/><br/>${data.analysis.replace(/\n/g, '<br/>')}`;
    
    // 显示结果区域
    document.getElementById('textResult').style.display = 'block';
    
    // 处理关键词警告
    handleKeywordWarnings(data.keyword_warnings);
}

// 处理关键词警告
function handleKeywordWarnings(warnings) {
    const keywordList = document.getElementById('keywordList');
    
    if (warnings.length > 0) {
        document.getElementById('keywordStatusBadge').className = 'status-badge status-high';
        document.getElementById('keywordStatusBadge').textContent = `发现 ${warnings.length} 个敏感词`;
        
        keywordList.innerHTML = warnings.map(warning => `
            <div class="keyword-warning">
                <i class="fas fa-exclamation-triangle warning-icon"></i>
                <div class="warning-content">
                    <div class="warning-text">
                        检测到敏感词：<strong>${warning.keyword}</strong> 
                        (${warning.category})
                    </div>
                </div>
                <div class="warning-severity severity-${warning.severity}">${warning.severity === 'high' ? '高危' : '中等'}</div>
            </div>
        `).join('');
        
        // 更新全局警示
        document.getElementById('globalAlert').classList.add('show');
        document.getElementById('alertText').textContent = 
            `发现 ${warnings.length} 个敏感词！${warnings[0].severity === 'high' ? '请立即处理！' : '请注意查看'}`;
    } else {
        document.getElementById('keywordStatusBadge').className = 'status-badge status-low';
        document.getElementById('keywordStatusBadge').textContent = '无异常';
        keywordList.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(167,167,167,0.6);">暂未发现敏感词</div>';
        document.getElementById('globalAlert').classList.remove('show');
    }
}

// 更新全局警示
function updateGlobalAlert(riskLevel, warningCount) {
    const alert = document.getElementById('globalAlert');
    
    if (riskLevel === 'high' || warningCount > 0) {
        alert.classList.add('show');
        document.getElementById('alertText').textContent = 
            warningCount > 0 
                ? `发现${warningCount}个敏感词！建议减少相关话题讨论` 
                : '检测到高风险内容！请谨慎处理';
    } else {
        alert.classList.remove('show');
    }
}

// 加载监控数据
async function loadWatchData() {
    const container = document.getElementById('watchDataContainer');
    container.innerHTML = '<div class="data-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
    
    try {
        const response = await fetch('/api/public-sentiment/watch-data', {
            method: 'POST'
        });
        
        const result = await response.json();
        
        if (result.success && result.data.length > 0) {
            const highRiskItems = result.data.filter(item => item.risk_level === 'high');
            const mediumRiskItems = result.data.filter(item => item.risk_level === 'medium');
            
            container.innerHTML = `
                <table class="layui-table">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>关键词</th>
                            <th>标题预览</th>
                            <th>风险等级</th>
                            <th>风险分数</th>
                            <th>采集时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${result.data.map((item, index) => `
                            <tr>
                                <td>${index + 1}</td>
                                <td><strong style="color:#FFD700;">${escapeHtml(item.keyword)}</strong></td>
                                <td>${escapeHtml(item.title || '无标题')}</td>
                                <td>
                                    <span class="status-badge status-${item.risk_level}">
                                        ${item.risk_level === 'high' ? '高风险' : item.risk_level === 'medium' ? '中风险' : '低风险'}
                                    </span>
                                </td>
                                <td><strong style="color:${getRiskColor(item.risk_score)};">${item.risk_score}/10</strong></td>
                                <td>${formatDate(item.create_at)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                ${highRiskItems.length > 0 ? `
                    <div style="margin-top:16px;padding:12px;background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:8px;">
                        <i class="fas fa-exclamation-triangle" style="color:#FF4444;"></i>
                        <strong>警告：</strong> 发现 ${highRiskItems.length} 条高风险数据，请及时处理！
                    </div>
                ` : ''}
            `;
        } else {
            container.innerHTML = '<div class="data-loading">暂无监控数据</div>';
        }
    } catch (error) {
        container.innerHTML = '<div class="data-loading" style="color:#FF4444;">加载失败</div>';
    }
}

// 切换聊天数据标签
function switchChatTab(tab) {
    currentChatTab = tab;
    ['tabQa', 'tabIm', 'tabAll'].forEach(id => {
        document.getElementById(id).classList.remove('active');
    });
    document.getElementById(tab === 'qa' ? 'tabQa' : tab === 'im' ? 'tabIm' : 'tabAll').classList.add('active');
    renderChatTable();
}

function renderChatTable() {
    const container = document.getElementById('chatDataContainer');
    let items = [];
    if (currentChatTab === 'qa') items = chatDataCache.qa_data || [];
    else if (currentChatTab === 'im') items = chatDataCache.im_data || [];
    else items = chatDataCache.data || [];

    if (!items.length) {
        container.innerHTML = '<div class="data-loading">暂无聊天数据</div>';
        return;
    }

    const highRiskItems = items.filter(item => item.risk_level === 'high');
    container.innerHTML = `
        <table class="data-table">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>来源</th>
                    <th>用户</th>
                    <th>内容预览</th>
                    <th>风险等级</th>
                    <th>风险词次数</th>
                    <th>发送时间</th>
                </tr>
            </thead>
            <tbody>
                ${items.map((item, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${escapeHtml(item.source || '-')}</td>
                        <td><strong style="color:#FFD700;">${escapeHtml(item.sender || '未知')}</strong></td>
                        <td style="word-break:break-all;">${escapeHtml(item.content_preview)}</td>
                        <td>
                            <span class="status-badge status-${item.risk_level}">
                                ${item.risk_level === 'high' ? '高风险' : item.risk_level === 'medium' ? '中风险' : '低风险'}
                            </span>
                        </td>
                        <td><strong style="color:${getRiskColor(item.risk_score)};">${item.keyword_total || 0}</strong></td>
                        <td>${formatDate(item.create_at)}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
        ${highRiskItems.length > 0 ? `
            <div style="margin-top:16px;padding:12px;background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:8px;">
                <i class="fas fa-exclamation-triangle" style="color:#FF4444;"></i>
                <strong>警告：</strong> 发现 ${highRiskItems.length} 条高风险聊天内容，已记录至风险统计！
            </div>
        ` : ''}
    `;
}

// 加载聊天数据
async function loadChatData() {
    const container = document.getElementById('chatDataContainer');
    container.innerHTML = '<div class="data-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
    
    try {
        const response = await fetch('/api/public-sentiment/chat-data', {
            method: 'POST'
        });
        
        const result = await response.json();
        
        if (result.success) {
            chatDataCache = result;
            renderChatTable();
            if ((result.summary && result.summary.high) > 0) {
                document.getElementById('globalAlert').classList.add('show');
                document.getElementById('alertText').textContent =
                    `聊天系统发现 ${result.summary.high} 条高风险内容！`;
            }
        } else {
            container.innerHTML = '<div class="data-loading">暂无聊天数据</div>';
        }
    } catch (error) {
        container.innerHTML = '<div class="data-loading" style="color:#FF4444;">加载失败</div>';
    }
}

// 加载高风险用户统计
async function loadRiskStats() {
    const container = document.getElementById('riskStatsContainer');
    container.innerHTML = '<div class="data-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';

    try {
        const response = await fetch('/api/public-sentiment/risk-stats', { method: 'POST' });
        const result = await response.json();

        if (!result.success) {
            container.innerHTML = '<div class="data-loading" style="color:#FF4444;">加载失败</div>';
            return;
        }

        const highUsers = result.high_risk_users || [];
        const recent = result.recent_records || [];

        if (!highUsers.length && !recent.length) {
            container.innerHTML = '<div class="data-loading">暂无高风险记录，系统持续监测中</div>';
            return;
        }

        container.innerHTML = `
            <div class="risk-stats-grid">
                <div class="risk-stat-card">
                    <h4><i class="fas fa-user-times"></i> 高风险用户汇总</h4>
                    ${highUsers.length ? `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>风险等级</th>
                                    <th>风险词总次数</th>
                                    <th>触发次数</th>
                                    <th>最近检测</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${highUsers.map(u => `
                                    <tr>
                                        <td><strong style="color:#FF4444;">${escapeHtml(u.username)}</strong></td>
                                        <td><span class="status-badge status-high">高风险</span></td>
                                        <td><strong>${u.keyword_total}</strong></td>
                                        <td>${u.event_count}</td>
                                        <td>${formatDate(u.last_detected)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : '<div style="color:rgba(167,167,167,0.6);padding:20px;text-align:center;">暂无高风险用户</div>'}
                </div>
                <div class="risk-stat-card">
                    <h4><i class="fas fa-history"></i> 最近风险记录</h4>
                    ${recent.length ? `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>用户</th>
                                    <th>来源</th>
                                    <th>风险词次数</th>
                                    <th>内容预览</th>
                                    <th>时间</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${recent.slice(0, 10).map(r => `
                                    <tr>
                                        <td>${escapeHtml(r.username)}</td>
                                        <td>${escapeHtml(r.source_name)}</td>
                                        <td><strong style="color:#FF4444;">${r.keyword_count}</strong></td>
                                        <td style="word-break:break-all;">${escapeHtml(r.content_preview || '')}</td>
                                        <td>${formatDate(r.create_at)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : '<div style="color:rgba(167,167,167,0.6);padding:20px;text-align:center;">暂无记录</div>'}
                </div>
            </div>
        `;
    } catch (error) {
        container.innerHTML = '<div class="data-loading" style="color:#FF4444;">加载失败</div>';
    }
}

// 辅助函数
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getRiskColor(score) {
    if (score >= 8) return '#FF4444';
    if (score >= 5) return '#FFC107';
    return '#10B981';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });
}

// 页面加载时自动加载数据
document.addEventListener('DOMContentLoaded', function() {
    loadWatchData();
    loadChatData();
    loadRiskStats();
    
    // 设置自动刷新（每 2 分钟）
    setInterval(() => {
        loadWatchData();
        loadChatData();
        loadRiskStats();
    }, 120000);
});
</script>
