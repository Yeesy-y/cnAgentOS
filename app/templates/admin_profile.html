{% extends "admin_base.html" %}
{% block content %}
<div style="padding:16px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <i class="layui-icon layui-icon-username"></i> 基本资料
        </div>
        <div class="layui-card-body">
            <form class="layui-form" action="/admin/user/profile" method="post">
                {% module xsrf_form_html() %}
                <div class="layui-form-item">
                    <label class="layui-form-label">用户名</label>
                    <div class="layui-input-inline">
                        <input type="text" value="{{ user['username'] }}" disabled class="layui-input layui-disabled">
                    </div>
                    <div class="layui-form-mid layui-word-aux">用户名不可修改</div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">姓名</label>
                    <div class="layui-input-inline">
                        <input type="text" name="real_name" value="{{ user.get('real_name', '') }}" placeholder="请输入姓名" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">邮箱</label>
                    <div class="layui-input-inline">
                        <input type="text" name="email" value="{{ user.get('email', '') }}" placeholder="请输入邮箱" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">手机号</label>
                    <div class="layui-input-inline">
                        <input type="text" name="phone" value="{{ user.get('phone', '') }}" placeholder="请输入手机号" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button type="submit" class="layui-btn">保存资料</button>
                        <a href="/admin/index" class="layui-btn layui-btn-primary">返回首页</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% end %}
