<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else "AI 智能瞭望系统" }}</title>
    <link rel="stylesheet" href="{{ static_url('dist/layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('dist/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#efe4e9 0%,#bdbbbf 100%);}
        .user-header{background:linear-gradient(135deg,#5f5f5f 0%,#8a8a8a 100%);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(95,95,95,0.2);}
        .user-header .logo{display:flex;align-items:center;gap:12px;color:#efe4e9;}
        .user-header .logo i{font-size:24px;}
        .user-header .logo h1{font-size:18px;font-weight:600;margin:0;}
        .user-header .nav-links{display:flex;gap:20px;align-items:center;}
        .user-header .nav-links a{color:rgba(239,228,233,0.85);text-decoration:none;font-size:14px;transition:all 0.3s ease;}
        .user-header .nav-links a:hover{color:#fff;}
        .user-header .nav-links .username{color:#efe4e9;font-size:14px;display:flex;align-items:center;gap:8px;}
        .user-container{padding:24px;max-width:1200px;margin:0 auto;}
    </style>
    {% block head %}{% end %}
</head>
<body>
    <div class="user-header">
        <div class="logo">
            <i class="fas fa-eye"></i>
            <h1>AI 智能瞭望系统</h1>
        </div>
        <div class="nav-links">
            <a href="/chat"><i class="fas fa-comments"></i> 聊天</a>
            <a href="/profile"><i class="fas fa-user"></i> 个人中心</a>
            <span class="username"><i class="fas fa-user-circle"></i> {{ username if username else "访客" }}</span>
        </div>
    </div>
    <div class="user-container">
        {% block body %}{% end %}
    </div>
    <script src="{{ static_url('dist/layui-v2.13.6/layui/layui.js') }}"></script>
    {% block js %}{% end %}
</body>
</html>
