<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>智能瞭望系统 - 用户注册</title>
	<link rel="stylesheet" href="{{ static_url('dist/layui-v2.13.6/layui/css/layui.css') }}">
	<link rel="stylesheet" href="{{ static_url('dist/fontawesome-free-5.15.4-web/css/all.min.css') }}">
	<style>
		*{margin:0;padding:0;box-sizing:border-box;}
		html,body{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Microsoft YaHei",sans-serif;}
		.page{width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:linear-gradient(180deg,#efe4e9 0%,#bdbbbf 100%);position:relative;overflow:hidden;}
		.card{position:relative;z-index:1;width:460px;max-width:92vw;background:rgba(255,255,255,0.25);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.3);border-radius:28px;padding:42px 40px 34px;box-shadow:0 30px 80px rgba(95,95,95,0.25),0 0 0 1px rgba(255,255,255,0.15) inset;}
		.header{text-align:center;margin-bottom:26px;}
		.logo{display:inline-flex;align-items:center;justify-content:center;width:66px;height:66px;background:linear-gradient(135deg,#5f5f5f,#8a8a8a);border-radius:22px;margin-bottom:14px;box-shadow:0 12px 32px rgba(95,95,95,0.35);}
		.logo i{font-size:28px;color:#fff;}
		.header h1{color:#5f5f5f;font-size:22px;font-weight:700;margin-bottom:6px;}
		.header p{color:rgba(95,95,95,0.7);font-size:13px;}
		.field{margin-bottom:18px;}
		.input-wrap{position:relative;}
		.input-wrap .layui-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#5f5f5f;font-size:18px;opacity:0.6;z-index:2;}
		.layui-input{height:52px;padding-left:50px;background:rgba(255,255,255,0.4);border:1.5px solid rgba(95,95,95,0.15);border-radius:16px;color:#5f5f5f;font-size:15px;}
		.layui-input:focus{border-color:#5f5f5f;box-shadow:0 0 0 4px rgba(95,95,95,0.1);background:rgba(255,255,255,0.6);}
		.btn{width:100%;height:52px;background:linear-gradient(135deg,#5f5f5f,#8a8a8a);border:none;border-radius:16px;color:#efe4e9;font-size:16px;font-weight:600;letter-spacing:3px;cursor:pointer;box-shadow:0 8px 24px rgba(95,95,95,0.35);margin-top:6px;}
		.btn:hover{background:linear-gradient(135deg,#8a8a8a,#5f5f5f);}
		.err{background:rgba(239,68,68,0.12);border:1.5px solid rgba(239,68,68,0.25);border-radius:14px;color:#C74545;padding:12px 16px;margin-bottom:16px;font-size:14px;display:flex;align-items:center;gap:10px;}
		.links{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
		.links a{color:rgba(95,95,95,0.75);font-size:13px;text-decoration:none;}
		.links a:hover{color:#5f5f5f;text-decoration:underline;}
	</style>
</head>
<body>
<div class="page">
	<div class="card">
		<div class="header">
			<div class="logo"><i class="fas fa-user-plus"></i></div>
			<h1>用户注册</h1>
			<p>注册成为普通用户（预留会员角色：订阅模式）</p>
		</div>

		{% if error %}
		<div class="err"><i class="fas fa-exclamation-circle"></i><span>{{ error }}</span></div>
		{% end %}

		<form action="/register" method="post">
			{% module xsrf_form_html() %}
			<div class="field">
				<div class="input-wrap">
					<i class="layui-icon layui-icon-username"></i>
					<input type="text" name="username" placeholder="用户名" autocomplete="username" class="layui-input" required value="{% if form %}{{ form.get('username','') }}{% end %}">
				</div>
			</div>
			<div class="field">
				<div class="input-wrap">
					<i class="layui-icon layui-icon-user"></i>
					<input type="text" name="real_name" placeholder="昵称（可选）" class="layui-input" value="{% if form %}{{ form.get('real_name','') }}{% end %}">
				</div>
			</div>
			<div class="field">
				<div class="input-wrap">
					<i class="layui-icon layui-icon-password"></i>
					<input type="password" name="password" placeholder="密码（至少6位）" autocomplete="new-password" class="layui-input" required>
				</div>
			</div>
			<div class="field">
				<div class="input-wrap">
					<i class="layui-icon layui-icon-password"></i>
					<input type="password" name="password2" placeholder="确认密码" autocomplete="new-password" class="layui-input" required>
				</div>
			</div>
			<div class="field">
				<button type="submit" class="btn" id="regBtn">注 册</button>
			</div>
		</form>

		<div class="links">
			<a href="/login">已有账号？去登录</a>
			<a href="/admin/login">管理后台登录</a>
		</div>
	</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function(){
	var btn = document.getElementById('regBtn');
	var form = document.querySelector('form');
	form.addEventListener('submit', function(){
		btn.disabled = true;
		btn.textContent = '注册中...';
	});
});
</script>
</body>
</html>
